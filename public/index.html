<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermes AgentOS — Living Office Floor Plan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { 
  background: #0c0c14;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: #fff;
}
#canvas-container { 
  width: 100vw; 
  height: 100vh; 
  position: fixed;
  top: 0;
  left: 0;
}

/* UI Overlay */
#ui {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 10;
}

/* Header */
.header {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 0;
  text-align: center;
  z-index: 100;
}
.title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  margin-bottom: 14px;
}
.user-bar {
  display: flex;
  gap: 14px;
  background: rgba(15, 15, 22, 0.9);
  backdrop-filter: blur(16px);
  padding: 12px 22px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.1);
  pointer-events: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.user-avatar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: transform 150ms ease;
}
.user-avatar:hover, .user-avatar.active { transform: translateY(-3px); }
.user-circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 200ms ease;
  position: relative;
}
.user-avatar.active .user-circle { transform: scale(1.1); border-color: rgba(255,255,255,0.5); }
.user-status-ring {
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 2px solid transparent;
}
.user-name {
  font-size: 9px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Right notification */
.notification {
  position: fixed;
  top: 22px;
  right: 22px;
  background: rgba(15, 15, 22, 0.92);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 18px;
  pointer-events: auto;
  min-width: 230px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.notif-title {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.notif-pulse {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ef4444;
  animation: pulse 1.5s ease-in-out infinite;
}
.notif-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}
.standup-btn {
  position: fixed;
  top: 22px;
  right: 280px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 14px 20px;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  pointer-events: auto;
  transition: all 150ms ease;
}
.standup-btn:hover { background: rgba(255,255,255,0.14); }

/* Sidebars */
.left-sidebar {
  position: fixed;
  left: 22px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 100;
}
.sidebar-icon {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  background: rgba(15, 15, 22, 0.9);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: rgba(255,255,255,0.55);
  pointer-events: auto;
  cursor: pointer;
  transition: all 150ms ease;
}
.sidebar-icon:hover, .sidebar-icon.active { background: rgba(30,30,45,0.95); color: #fff; }

.right-sidebar {
  position: fixed;
  right: 24px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
  transform-origin: center right;
  display: flex;
  gap: 36px;
  z-index: 100;
}
.right-label {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  pointer-events: auto;
  transition: color 150ms ease;
  white-space: nowrap;
}
.right-label:hover { color: rgba(255,255,255,0.9); }

/* Bottom status bar */
.status-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 10, 14, 0.94);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 14px 28px;
  display: flex;
  justify-content: center;
  gap: 42px;
  z-index: 100;
  pointer-events: auto;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  transition: color 200ms ease;
}
.status-item.active { color: #fff; }
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}
.chat-btn {
  position: fixed;
  bottom: 12px;
  right: 22px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 12px 18px;
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.12em;
  cursor: pointer;
  pointer-events: auto;
  z-index: 101;
  transition: all 150ms ease;
}
.chat-btn:hover { background: rgba(255,255,255,0.18); }

/* Agent detail panel */
#detail-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  background: rgba(15, 15, 22, 0.96);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 28px;
  min-width: 360px;
  max-width: 420px;
  pointer-events: auto;
  z-index: 200;
  opacity: 0;
  visibility: hidden;
  transition: all 200ms ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#detail-panel.open {
  opacity: 1;
  visibility: visible;
  transform: translate(-50%, -50%) scale(1);
}
.detail-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.detail-avatar {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  background: rgba(255,255,255,0.05);
}
.detail-title {
  flex: 1;
}
.detail-name {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}
.detail-role {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.5);
}
.detail-close {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  font-size: 18px;
  cursor: pointer;
  transition: all 150ms ease;
}
.detail-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
.detail-status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  margin-bottom: 20px;
}
.detail-status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
.detail-status-text {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
}
.detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.detail-stat {
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.detail-stat-value {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}
.detail-stat-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4);
}
.detail-section {
  margin-bottom: 16px;
}
.detail-section-title {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.4);
  margin-bottom: 10px;
}
.detail-task-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.detail-task {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
}
.detail-task::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* Controls */
.controls {
  position: fixed;
  bottom: 90px;
  right: 22px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
  pointer-events: auto;
}
.ctrl-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: rgba(15, 15, 22, 0.92);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: all 150ms ease;
}
.ctrl-btn:hover { background: rgba(35, 35, 50, 0.95); }
.ctrl-btn.active { background: rgba(59, 130, 246, 0.3); }

/* Toast */
#toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(15, 15, 22, 0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  pointer-events: none;
  opacity: 0;
  transition: all 200ms ease;
  z-index: 150;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.85); }
}

#loading {
  position: fixed;
  inset: 0;
  background: #0c0c14;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 300ms ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #8B5CF6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.loading-text {
  margin-top: 16px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Assembling Office</div>
</div>

<div id="canvas-container"></div>

<div id="ui">
  <div class="header">
    <div class="title">Hermes Headquarters</div>
    <div class="user-bar" id="userBar"></div>
  </div>

  <div class="notification">
    <div class="notif-title"><span class="notif-pulse"></span> Gathering in meeting room...</div>
    <div class="notif-sub" id="meetingSub">4/5 attending — Daily standup</div>
  </div>
  <button class="standup-btn">Standup Board</button>

  <div class="left-sidebar">
    <div class="sidebar-icon active" data-view="office">🏢</div>
    <div class="sidebar-icon" data-view="tasks">📋</div>
    <div class="sidebar-icon" data-view="metrics">📊</div>
    <div class="sidebar-icon" data-view="settings">⚙️</div>
    <div class="sidebar-icon" data-view="lock">🔒</div>
  </div>

  <div class="right-sidebar">
    <div class="right-label">Open</div>
    <div class="right-label">Marketplace</div>
    <div class="right-label">Analytics</div>
  </div>

  <div class="status-footer" id="statusFooter"></div>
  <button class="chat-btn">Chat</button>

  <div class="controls">
    <button class="ctrl-btn" id="zoomIn">+</button>
    <button class="ctrl-btn" id="zoomOut">−</button>
    <button class="ctrl-btn" id="rotateBtn">↻</button>
    <button class="ctrl-btn active" id="labelsBtn" title="Toggle labels">🏷</button>
  </div>

  <div id="detail-panel">
    <div class="detail-header">
      <div class="detail-avatar" id="detailAvatar"></div>
      <div class="detail-title">
        <div class="detail-name" id="detailName"></div>
        <div class="detail-role" id="detailRole"></div>
      </div>
      <button class="detail-close" id="detailClose">✕</button>
    </div>
    <div class="detail-status" id="detailStatus">
      <span class="detail-status-dot" id="detailStatusDot"></span>
      <span class="detail-status-text" id="detailStatusText">Working on research</span>
    </div>
    
    <div class="detail-grid">
      <div class="detail-stat">
        <div class="detail-stat-value" id="statTasks">12</div>
        <div class="detail-stat-label">Tasks Done</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-value" id="statActive">3</div>
        <div class="detail-stat-label">Active</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-value" id="statHours">4.2h</div>
        <div class="detail-stat-label">Today</div>
      </div>
    </div>
    
    <div class="detail-section">
      <div class="detail-section-title">Current Tasks</div>
      <div class="detail-task-list" id="detailTasks"></div>
    </div>
    
    <div class="detail-section">
      <div class="detail-section-title">Recent Output</div>
      <div class="detail-task-list" id="detailOutput"></div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const AGENTS = (window.__HERMES_AGENTS__ && window.__HERMES_AGENTS__.length)
  ? window.__HERMES_AGENTS__
  : [
  { id: 'orchestrator', name: 'Orchestrator', color: '#8B5CF6', role: 'Supervisor', emoji: '🧠', home: 'meeting', tasks: ['Reviewing pipeline', 'Coordinating agents', 'Approving handoffs'], output: ['Daily brief issued', 'Pipeline updated'] },
  { id: 'analyst', name: 'Analyst', color: '#3B82F6', role: 'Research', emoji: '📊', home: 'left', tasks: ['Market research', 'Data synthesis', 'Trend analysis'], output: ['Competitor report', 'Keyword research'] },
  { id: 'writer', name: 'Writer', color: '#EC4899', role: 'Content', emoji: '✍️', home: 'center', tasks: ['Drafting article', 'Editing copy', 'SEO optimization'], output: ['Blog post v2', 'Thread draft'] },
  { id: 'marketer', name: 'Marketer', color: '#F59E0B', role: 'Growth', emoji: '📢', home: 'right', tasks: ['Campaign planning', 'Audience targeting', 'Post scheduling'], output: ['Launch plan', 'Campaign brief'] },
  { id: 'coder', name: 'Coder', color: '#10B981', role: 'Dev', emoji: '💻', home: 'right2', tasks: ['Feature build', 'Code review', 'Deploy checks'], output: ['API endpoint', 'Bug fix merged'] }
];

const STATUS_LABELS = {
  working: 'working',
  idle: 'idle',
  meeting: 'meeting',
  away: 'away',
  walking: 'walking'
};

const agentStates = {};
const agentStats = {};
const recentChats = [];

function resetAgentStates(agentList) {
  agentList.forEach(a => {
    if (!agentStates[a.id]) {
      agentStates[a.id] = { status: a.status || 'idle', task: a.task || 'Idle', targetX: 0, targetZ: 0, currentX: 0, currentZ: 0 };
    }
    agentStates[a.id].status = a.status || agentStates[a.id].status;
    agentStates[a.id].task = a.task || agentStates[a.id].task;
    if (a.stats) agentStats[a.id] = a.stats;
  });
}

AGENTS.forEach(a => {
  agentStates[a.id] = { status: a.status || 'idle', task: a.task || 'Idle', targetX: 0, targetZ: 0, currentX: 0, currentZ: 0 };
  agentStats[a.id] = a.stats || { tasksDone: Math.floor(Math.random() * 30) + 8, active: Math.floor(Math.random() * 5) + 1, hours: (Math.random() * 6 + 1).toFixed(1) };
});

const ROOM_WIDTH = 38;
const ROOM_DEPTH = 26;
const WALL_HEIGHT = 3.2;

let scene, camera, renderer, raycaster, mouse;
let agents = [], labels = [], clickableObjects = [], bubbles = [], particles = [];
let zoom = 1, autoRotate = false, labelsVisible = true;
let currentRotation = -Math.PI / 4, targetRotation = -Math.PI / 4;
let clock, selectedAgent = null;
let lastMeetingUpdate = 0;
let liveConfig = { mode: 'demo', enable_sse: true };

function applyLiveAgents(newAgents) {
  // Update existing / add new agents
  newAgents.forEach(na => {
    const existing = AGENTS.find(a => a.id === na.id);
    if (existing) {
      Object.assign(existing, na);
    } else {
      AGENTS.push(na);
    }
    const state = agentStates[na.id];
    if (state) {
      state.status = na.status || state.status;
      state.task = na.task || state.task;
    } else {
      agentStates[na.id] = { status: na.status || 'idle', task: na.task || 'Idle', targetX: 0, targetZ: 0, currentX: 0, currentZ: 0 };
    }
    if (na.stats) agentStats[na.id] = na.stats;
  });
  createAgents();
  setupUI();
  updateStatusBar();
  if (selectedAgent) selectAgent(selectedAgent.id);
  showToast('Live agents synced');
}

async function fetchAgents() {
  try {
    const res = await fetch('/api/agents', { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    if (Array.isArray(data) && data.length) applyLiveAgents(data);
  } catch (e) { console.log('Agent fetch failed:', e); }
}

async function fetchConfig() {
  try {
    const res = await fetch('/api/config', { cache: 'no-store' });
    if (res.ok) liveConfig = await res.json();
  } catch (e) {}
}

function startLiveUpdates() {
  fetchConfig();
  fetchAgents();
  setInterval(fetchAgents, 5000);

  if (liveConfig.enable_sse) {
    const es = new EventSource('/events');
    es.onmessage = ev => {
      try {
        const data = JSON.parse(ev.data);
        if (data.agents) applyLiveAgents(data.agents);
      } catch (e) {}
    };
    es.onerror = () => { /* falls back to polling */ };
  }
}

function hideLoading() {
  const loading = document.getElementById('loading');
  if (loading) loading.classList.add('hidden');
}

function init() {
  try {
    clock = new THREE.Clock();
    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0c0c14);
    scene.fog = new THREE.Fog(0x0c0c14, 45, 80);
    
    camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    updateCamera();
    
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    setupLighting();
    createRoom();
    createFurniture();
    createAgents();
    setupUI();
    updateStatusBar();
    
    // Controls
    document.getElementById('zoomIn').addEventListener('click', () => { zoom = Math.max(0.5, zoom - 0.12); updateCamera(); });
    document.getElementById('zoomOut').addEventListener('click', () => { zoom = Math.min(2.2, zoom + 0.12); updateCamera(); });
    document.getElementById('rotateBtn').addEventListener('click', () => { 
      autoRotate = !autoRotate; 
      document.getElementById('rotateBtn').classList.toggle('active', autoRotate);
    });
    document.getElementById('labelsBtn').addEventListener('click', () => {
      labelsVisible = !labelsVisible;
      document.getElementById('labelsBtn').classList.toggle('active', labelsVisible);
      labels.forEach(l => l.visible = labelsVisible);
    });
    document.getElementById('detailClose').addEventListener('click', closeDetail);
    document.getElementById('userBar').addEventListener('click', (e) => {
      const avatar = e.target.closest('.user-avatar');
      if (avatar) selectAgent(avatar.dataset.agent);
    });
    document.getElementById('canvas-container').addEventListener('click', onCanvasClick);
    document.getElementById('canvas-container').addEventListener('mousemove', onMouseMove);
    
    // Sidebar clicks
    document.querySelectorAll('.sidebar-icon').forEach(icon => {
      icon.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-icon').forEach(i => i.classList.remove('active'));
        icon.classList.add('active');
        showToast(`Switched to ${icon.dataset.view} view`);
      });
    });
    
    window.addEventListener('resize', onWindowResize);
    
    setInterval(updateBehavior, 3500);
    setInterval(spawnRandomChat, 2500);
    updateBehavior();
    
    animate();
  } catch (err) {
    console.error('Office init error:', err);
    showToast('Office loaded with fallback mode');
  } finally {
    setTimeout(hideLoading, 600);
    startLiveUpdates();
  }
}

function updateCamera() {
  const distance = 48 * zoom;
  const height = 40 * zoom;
  camera.position.set(
    Math.sin(currentRotation) * distance,
    height,
    Math.cos(currentRotation) * distance
  );
  camera.lookAt(0, 0, 0);
}

function setupLighting() {
  const ambient = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambient);
  
  const sun = new THREE.DirectionalLight(0xfff8e7, 0.7);

function createWindow(x, y, z, rot) {
  const group = new THREE.Group();
  group.position.set(x, y, z);
  group.rotation.y = rot;
  
  const glass = new THREE.Mesh(
    new THREE.PlaneGeometry(4, 1.8),
    new THREE.MeshBasicMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.25, side: THREE.DoubleSide })
  );
  group.add(glass);
  
  // Frame
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x3a3a45 });
  [[0, 0.9, 4, 0.08], [0, -0.9, 4, 0.08], [-2, 0, 0.08, 1.8], [2, 0, 0.08, 1.8], [0, 0, 0.06, 1.8]].forEach(([fx, fy, fw, fh]) => {
    const frame = new THREE.Mesh(new THREE.BoxGeometry(fw, fh, 0.08), frameMat);
    frame.position.set(fx, fy, 0);
    group.add(frame);
  });
  
  scene.add(group);
}

function createPoster(x, y, z, color, emoji) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 180;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 128, 180);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(8, 8, 112, 164);
  ctx.font = '60px serif';
  ctx.textAlign = 'center';
  ctx.fillText(emoji, 64, 100);
  
  const tex = new THREE.CanvasTexture(canvas);
  const poster = new THREE.Mesh(
    new THREE.PlaneGeometry(0.9, 1.2),
    new THREE.MeshBasicMaterial({ map: tex })
  );
  poster.position.set(x, y, z);
  poster.rotation.y = x < 0 ? Math.PI/2 : -Math.PI/2;
  if (z > 0) poster.rotation.y = 0;
  scene.add(poster);
}

function createServerRoom() {
  const roomX = -ROOM_WIDTH/2 + 4.5;
  const roomZ = -ROOM_DEPTH/2 + 3.5;
  
  // Glass walls
  const glassMat = new THREE.MeshStandardMaterial({ color: 0x2a2a35, transparent: true, opacity: 0.35, roughness: 0.1, metalness: 0.6 });
  const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.4, 6), glassMat);
  p1.position.set(roomX + 2.6, 1.2, roomZ);
  scene.add(p1);
  const p2 = new THREE.Mesh(new THREE.BoxGeometry(4.8, 2.4, 0.08), glassMat);
  p2.position.set(roomX, 1.2, roomZ + 2.8);
  scene.add(p2);
  
  // Server racks
  const rackGeo = new THREE.BoxGeometry(0.65, 1.8, 1);
  const rackMat = new THREE.MeshStandardMaterial({ color: 0x15151c, roughness: 0.3, metalness: 0.6 });
  
  for (let i = 0; i < 3; i++) {
    const rack = new THREE.Mesh(rackGeo, rackMat);
    rack.position.set(roomX - 1.2 + i * 0.9, 0.9, roomZ + 1.2);
    rack.castShadow = true;
    scene.add(rack);
    
    // Blinking LEDs
    for (let j = 0; j < 8; j++) {
      const led = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.06, 0.02),
        new THREE.MeshBasicMaterial({ color: j % 3 === 0 ? 0x00ff88 : j % 3 === 1 ? 0x00ccff : 0xffaa00 })
      );
      led.position.set(roomX - 1.2 + i * 0.9, 0.3 + j * 0.18, roomZ + 1.7);
      led.userData = { blink: true, offset: i * 10 + j };
      scene.add(led);
    }
  }
}

function createDesk(x, z, angle, ownerId) {
  const group = new THREE.Group();

  [[-1, -0.5], [1, -0.5], [-1, 0.5], [1, 0.5]].forEach(([lx, lz]) => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.85, 8), legMat);
    leg.position.set(lx, 0.425, lz);
    group.add(leg);
  });

  const monitor = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.6, 0.06), new THREE.MeshStandardMaterial({ color: 0x15151c }));
  monitor.position.set(0, 1.25, -0.4);
  monitor.castShadow = true;

  const agent = AGENTS.find(a => a.id === ownerId);
  const screenColor = agent ? agent.color : 0x3B82F6;
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.78, 0.55), new THREE.MeshBasicMaterial({ color: screenColor }));
  screen.position.set(0, 1.25, -0.36);
  group.add(screen);
  
  // Keyboard + mouse
  const kb = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.02, 0.22), new THREE.MeshStandardMaterial({ color: 0x2a2a30 }));
  kb.position.set(0, 0.91, 0.22);
  group.add(kb);
  const mouse = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.04, 0.14), new THREE.MeshStandardMaterial({ color: 0x333 }));
  mouse.position.set(0.35, 0.91, 0.22);
  group.add(mouse);
  
  // Desk clutter
  if (Math.random() > 0.3) {
    const mug = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.12, 12), new THREE.MeshStandardMaterial({ color: 0xffffff }));
    mug.position.set(-0.6, 0.91, 0.35);
    mug.castShadow = true;
    group.add(mug);
  }
  if (Math.random() > 0.4) {
    const notebook = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.02, 0.35), new THREE.MeshStandardMaterial({ color: 0x4a6fa5 }));
    notebook.position.set(0.6, 0.91, -0.25);
    group.add(notebook);
  }
  
  // Chair
  const chairColor = agent ? new THREE.Color(agent.color).multiplyScalar(0.65).getHex() : 0x4a4a55;
  createChair(x + Math.sin(angle) * 1.6, z + Math.cos(angle) * 1.6, angle, chairColor);
  
  scene.add(group);
  clickableObjects.push(group);
}

function createPlant(x, z, type = 0) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  
  const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.24, 0.4, 12), new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 }));
  pot.position.y = 0.2;
  pot.castShadow = true;
  group.add(pot);
  
  if (type === 0) {
    // Ficus style
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
    for (let i = 0; i < 6; i++) {
      const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.18 + Math.random() * 0.1, 8, 8), leafMat);
      leaf.position.set((Math.random() - 0.5) * 0.3, 0.65 + Math.random() * 0.35, (Math.random() - 0.5) * 0.3);
      leaf.scale.y = 1.4 + Math.random();
      group.add(leaf);
    }
  } else if (type === 1) {
    // Cactus style
    const cactus = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.6, 12), new THREE.MeshStandardMaterial({ color: 0x2d6a4f }));
    cactus.position.y = 0.6;
    group.add(cactus);
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.25, 8), new THREE.MeshStandardMaterial({ color: 0x2d6a4f }));
    arm.position.set(0.12, 0.75, 0);
    arm.rotation.z = -Math.PI/4;
    group.add(arm);
  } else {
    // Snake plant
    const leafMat = new THREE.MeshStandardMaterial({ color: 0x3a7d44 });
    for (let i = 0; i < 5; i++) {
      const blade = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.8 + Math.random() * 0.3, 0.03), leafMat);
      blade.position.set((i - 2) * 0.06, 0.7, 0);
      blade.rotation.z = (i - 2) * 0.1;
      group.add(blade);
    }
  }
  
  scene.add(group);
}

function createDecor() {
  // Entrance mat
  const mat = new THREE.Mesh(new THREE.BoxGeometry(3, 0.03, 1.5), new THREE.MeshStandardMaterial({ color: 0x3a5a40 }));
  mat.position.set(0, 0.02, ROOM_DEPTH/2 - 1);
  mat.receiveShadow = true;
  scene.add(mat);
  
  // Clock on wall
  const clockFace = new THREE.Mesh(new THREE.CircleGeometry(0.5, 32), new THREE.MeshBasicMaterial({ color: 0xffffff }));
  clockFace.position.set(0, 2, -ROOM_DEPTH/2 + 0.12);
  clockFace.rotation.y = Math.PI;
  scene.add(clockFace);
  
  const hand1 = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.4, 0.02), new THREE.MeshBasicMaterial({ color: 0x1a1a2e }));
  hand1.position.set(0, 2, -ROOM_DEPTH/2 + 0.14);
  hand1.rotation.y = Math.PI;
  scene.add(hand1);
}

function createAgents() {
  // Clear old agents if re-initializing from live data
  agents.forEach(a => scene.remove(a.group));
  labels.forEach(l => scene.remove(l));
  clickableObjects = clickableObjects.filter(o => !o.userData.agentId);
  agents = [];
  labels = [];

  AGENTS.forEach((agent, i) => {
    const group = new THREE.Group();
    const startPos = getHomePosition(agent.home);
    group.position.set(startPos.x, 0, startPos.z);
    
    const color = new THREE.Color(agent.color);
    const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x2a2a35 });
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xf0d0b0 });
    
    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.55, 0.26), mat);
    body.position.y = 0.85;
    body.castShadow = true;
    group.add(body);
    
    // Head
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.3, 0.28), skinMat);
    head.position.y = 1.35;
    head.castShadow = true;
    group.add(head);
    
    // Hair
    const hair = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.3), darkMat);
    hair.position.y = 1.52;
    group.add(hair);
    
    // Eyes
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x1a1a2e });
    const leftEye = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.02), eyeMat);
    leftEye.position.set(-0.07, 1.38, 0.14);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.02), eyeMat);
    rightEye.position.set(0.07, 1.38, 0.14);
    group.add(rightEye);
    
    // Arms
    const armGeo = new THREE.BoxGeometry(0.1, 0.45, 0.1);
    const leftArm = new THREE.Mesh(armGeo, mat);
    leftArm.position.set(-0.28, 0.9, 0);
    group.add(leftArm);
    const rightArm = new THREE.Mesh(armGeo, mat);
    rightArm.position.set(0.28, 0.9, 0);
    group.add(rightArm);
    
    // Legs
    const legGeo = new THREE.BoxGeometry(0.12, 0.5, 0.15);
    const leftLeg = new THREE.Mesh(legGeo, darkMat);
    leftLeg.position.set(-0.12, 0.25, 0);
    group.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, darkMat);
    rightLeg.position.set(0.12, 0.25, 0);
    group.add(rightLeg);
    
    // Mood ring
    const ringGeo = new THREE.TorusGeometry(0.4, 0.03, 8, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: agent.color, transparent: true, opacity: 0.6 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    ring.position.y = 0.02;
    group.add(ring);
    
    scene.add(group);
    
    agentStates[agent.id].currentX = startPos.x;
    agentStates[agent.id].currentZ = startPos.z;
    agentStates[agent.id].targetX = startPos.x;
    agentStates[agent.id].targetZ = startPos.z;
    
    const label = createLabel(agent.name, agent.color);
    scene.add(label);
    
    // Invisible click target
    const clickTarget = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2, 0.6), new THREE.MeshBasicMaterial({ visible: false }));
    clickTarget.position.y = 1;
    group.add(clickTarget);
    clickTarget.userData = { agentId: agent.id };
    clickableObjects.push(clickTarget);
    
    agents.push({
      group, body, head, leftArm, rightArm, leftLeg, rightLeg, ring, agent, label, clickTarget,
      walkCycle: 0, time: Math.random() * 100, coffeeMug: null, onPhone: false
    });
  });
}

function getHomePosition(home) {
  switch(home) {
    case 'meeting': return { x: 0, z: -ROOM_DEPTH/2 + 6.5 };
    case 'left': return { x: -10.5, z: -2.5 };
    case 'center': return { x: -4, z: 0 };
    case 'right': return { x: 5, z: -1 };
    case 'right2': return { x: 10.5, z: 2 };
    default: return { x: 0, z: 0 };
  }
}

function createLabel(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  roundRect(ctx, 0, 0, canvas.width, canvas.height, 12);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 22px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  const texture = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
  sprite.scale.set(2.4, 0.6, 1);
  return sprite;
}

function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function setupUI() {
  const userBar = document.getElementById('userBar');
  userBar.innerHTML = AGENTS.map(a => `
    <div class="user-avatar" data-agent="${a.id}">
      <div class="user-circle" style="background: ${a.color}22; border-color: ${a.color}70">
        <span class="user-status-ring" style="border-color: ${a.color}"></span>
        ${a.emoji}
      </div>
      <span class="user-name" style="color:${a.color}">${a.name}</span>
    </div>
  `).join('');
}

function updateStatusBar() {
  const footer = document.getElementById('statusFooter');
  const counts = {
    working: AGENTS.filter(a => agentStates[a.id].status === 'working').length,
    idle: AGENTS.filter(a => agentStates[a.id].status === 'idle').length,
    meeting: AGENTS.filter(a => agentStates[a.id].status === 'meeting').length,
    walking: AGENTS.filter(a => agentStates[a.id].status === 'walking').length
  };
  
  const items = [
    { key: 'working', label: 'working', color: '#5ee2b5' },
    { key: 'idle', label: 'idle', color: '#f5b544' },
    { key: 'meeting', label: 'meeting', color: '#8B5CF6' },
    { key: 'walking', label: 'walking', color: '#7DD3FC' },
    { key: 'away', label: 'away', color: 'rgba(255,255,255,0.3)' },
    { key: 'out', label: 'out', color: 'rgba(255,255,255,0.3)' },
    { key: 'sick', label: 'sick', color: 'rgba(255,255,255,0.3)' }
  ];
  
  footer.innerHTML = items.map(item => {
    const count = counts[item.key] || 0;
    return `
      <div class="status-item ${count > 0 ? 'active' : ''}">
        <span class="status-dot" style="background:${item.color}"></span>
        <span style="color:${count > 0 ? item.color : ''}">${count} ${item.label}</span>
      </div>
    `;
  }).join('');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function selectAgent(agentId) {
  const agent = AGENTS.find(a => a.id === agentId);
  if (!agent) return;
  selectedAgent = agent;
  
  const panel = document.getElementById('detail-panel');
  const state = agentStates[agentId] || { status: agent.status || 'idle', task: agent.task || 'Idle' };
  const stats = agentStats[agentId] || { tasksDone: 0, active: 0, hours: 0 };
  
  document.getElementById('detailAvatar').textContent = agent.emoji;
  document.getElementById('detailAvatar').style.background = agent.color + '22';
  document.getElementById('detailName').textContent = agent.name;
  document.getElementById('detailRole').textContent = agent.role;
  document.getElementById('detailStatusDot').style.background = agent.color;
  document.getElementById('detailStatusDot').style.boxShadow = `0 0 12px ${agent.color}`;
  document.getElementById('detailStatusText').textContent = state.task || state.status;
  document.getElementById('statTasks').textContent = stats.tasksDone || 0;
  document.getElementById('statActive').textContent = stats.active || 0;
  document.getElementById('statHours').textContent = (stats.hours || 0) + 'h';
  
  document.getElementById('detailTasks').innerHTML = (agent.tasks || []).map(t => `
    <div class="detail-task" style="color:${agent.color}">${t}</div>
  `).join('');
  document.getElementById('detailOutput').innerHTML = (agent.output || []).map(o => `
    <div class="detail-task">${o}</div>
  `).join('');
  
  panel.classList.add('open');
  
  // Highlight in user bar
  document.querySelectorAll('.user-avatar').forEach(el => {
    el.classList.toggle('active', el.dataset.agent === agentId);
  });
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.user-avatar').forEach(el => el.classList.remove('active'));
  selectedAgent = null;
}

function onCanvasClick(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(clickableObjects);
  
  if (intersects.length > 0) {
    const agentId = intersects[0].object.userData.agentId;
    if (agentId) selectAgent(agentId);
  }
}

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(clickableObjects);
  document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
}

function updateBehavior() {
  const now = Date.now();
  let meetingCount = 0;
  
  AGENTS.forEach(agent => {
    const state = agentStates[agent.id];
    const rand = Math.random();
    
    if (rand < 0.35) {
      state.status = 'meeting';
      const angle = Math.random() * Math.PI * 2;
      state.targetX = Math.cos(angle) * 2;
      state.targetZ = -ROOM_DEPTH/2 + 6.5 + Math.sin(angle) * 2;
      state.task = ['In standup', 'Discussing roadmap', 'Sprint planning', 'Reviewing metrics'][Math.floor(Math.random() * 4)];
      meetingCount++;
    } else if (rand < 0.65) {
      state.status = 'working';
      const home = getHomePosition(agent.home);
      state.targetX = home.x + (Math.random() - 0.5) * 1.2;
      state.targetZ = home.z + (Math.random() - 0.5) * 1.2;
      state.task = agent.tasks[Math.floor(Math.random() * agent.tasks.length)];
    } else if (rand < 0.85) {
      state.status = 'walking';
      state.targetX = (Math.random() - 0.5) * (ROOM_WIDTH - 8);
      state.targetZ = (Math.random() - 0.5) * (ROOM_DEPTH - 8);
      state.task = ['Coffee run', 'Water cooler chat', 'Walking break', 'Changing desk'][Math.floor(Math.random() * 4)];
    } else {
      state.status = 'idle';
      state.task = 'Taking a break';
      const home = getHomePosition(agent.home);
      state.targetX = home.x;
      state.targetZ = home.z;
    }
  });
  
  // Update meeting notification
  document.getElementById('meetingSub').textContent = `${Math.max(meetingCount, 2)}/5 attending — Daily standup`;
  
  updateStatusBar();
}

function spawnRandomChat() {
  // Find agents close together; throttle so bubbles don't stack
  const chatMessages = ['Nice work!', 'LGTM', 'Can you review?', 'On it', 'Coffee?', 'Standup?', 'Synced'];
  const now = Date.now();
  
  for (let i = 0; i < agents.length; i++) {
    const a1 = agents[i];
    if (a1.lastBubble && now - a1.lastBubble < 4000) continue;
    
    for (let j = i + 1; j < agents.length; j++) {
      const a2 = agents[j];
      if (a2.lastBubble && now - a2.lastBubble < 4000) continue;
      
      const dist = a1.group.position.distanceTo(a2.group.position);
      
      if (dist < 3.2 && Math.random() > 0.75) {
        const msg = chatMessages[Math.floor(Math.random() * chatMessages.length)];
        showChatBubble(a1, msg);
        a1.lastBubble = now;
        a2.lastBubble = now;
        break;
      }
    }
  }
}

function showChatBubble(agentObj, text) {
  // Remove existing bubble for this agent to avoid overlap
  if (agentObj.activeBubble) {
    scene.remove(agentObj.activeBubble.sprite);
    const idx = bubbles.indexOf(agentObj.activeBubble);
    if (idx > -1) bubbles.splice(idx, 1);
  }
  
  const canvas = document.createElement('canvas');
  canvas.width = 300;
  canvas.height = 80;
  const ctx = canvas.getContext('2d');
  
  ctx.fillStyle = '#1a1a2e';
  ctx.strokeStyle = agentObj.agent.color;
  ctx.lineWidth = 2;
  roundRect(ctx, 0, 0, 300, 70, 12);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 24px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 150, 35);
  
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.scale.set(1.8, 0.5, 1);
  sprite.position.set(agentObj.group.position.x, agentObj.group.position.y + 2.6, agentObj.group.position.z);
  scene.add(sprite);
  
  const bubble = { sprite, time: 0, life: 2.2 };
  bubbles.push(bubble);
  agentObj.activeBubble = bubble;
}

function updateBubbles(delta) {
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.time += delta;
    b.sprite.position.y += delta * 0.4;
    b.sprite.material.opacity = Math.max(0, 1 - (b.time / b.life));
    
    if (b.time > b.life) {
      scene.remove(b.sprite);
      // Clear activeBubble reference if this was it
      agents.forEach(a => {
        if (a.activeBubble === b) a.activeBubble = null;
      });
      bubbles.splice(i, 1);
    }
  }
}

function createTypingParticles(agentObj) {
  if (Math.random() > 0.3) return;
  
  const p = new THREE.Mesh(
    new THREE.BoxGeometry(0.04, 0.04, 0.04),
    new THREE.MeshBasicMaterial({ color: agentObj.agent.color })
  );
  p.position.set(
    agentObj.group.position.x + (Math.random() - 0.5) * 0.5,
    agentObj.group.position.y + 1.2,
    agentObj.group.position.z + 0.4
  );
  scene.add(p);
  particles.push({ mesh: p, vy: 0.02 + Math.random() * 0.02, life: 1 });
}

function updateParticles(delta) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= delta;
    p.mesh.position.y += p.vy;
    p.mesh.position.x += Math.sin(Date.now() * 0.005 + i) * 0.005;
    p.mesh.rotation.x += delta;
    p.mesh.rotation.y += delta;
    p.mesh.material.opacity = p.life;
    p.mesh.material.transparent = true;
    
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }
}

function animateAgents(delta) {
  const now = Date.now();
  
  agents.forEach(a => {
    const state = agentStates[a.agent.id];
    a.time += delta;
    
    const dx = state.targetX - a.group.position.x;
    const dz = state.targetZ - a.group.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    
    // Mood ring pulse
    const pulse = 0.6 + Math.sin(a.time * 3) * 0.3;
    a.ring.material.opacity = pulse;
    a.ring.material.color.set(a.agent.color);
    
    if (dist > 0.4) {
      a.walkCycle += delta * 9;
      const speed = 2.2 * delta;
      a.group.position.x += (dx / dist) * speed;
      a.group.position.z += (dz / dist) * speed;
      
      a.group.rotation.y = Math.atan2(dx, dz);
      
      const swing = Math.sin(a.walkCycle) * 0.5;
      a.leftLeg.rotation.x = swing;
      a.rightLeg.rotation.x = -swing;
      a.leftArm.rotation.x = -swing * 0.6;
      a.rightArm.rotation.x = swing * 0.6;
      
      a.group.position.y = Math.abs(Math.sin(a.walkCycle * 2)) * 0.06;
      
      // Only override status to walking if we're actually en route and weren't forced to another state
      if (state.status !== 'meeting' && state.status !== 'working' && state.status !== 'idle') {
        state.status = 'walking';
      }
    } else {
      // Arrived: lock in the intended status from updateBehavior, or default to idle
      if (state.status === 'walking') {
        state.status = 'idle';
        state.task = state.task || 'Idle';
      }
      
      // Idle / working
      a.group.position.y *= 0.9;
      a.leftLeg.rotation.x *= 0.9;
      a.rightLeg.rotation.x *= 0.9;
      a.leftArm.rotation.x *= 0.9;
      a.rightArm.rotation.x *= 0.9;
      
      const bob = Math.sin(a.time * 2) * 0.015;
      a.body.position.y = 0.85 + bob;
      a.head.position.y = 1.35 + bob;
      a.leftArm.position.y = 0.9 + bob;
      a.rightArm.position.y = 0.9 + bob;
      a.leftLeg.position.y = 0.25;
      a.rightLeg.position.y = 0.25;
      
      if (state.status === 'working') {
        a.leftArm.rotation.x = Math.sin(a.time * 8) * 0.25;
        a.rightArm.rotation.x = -Math.sin(a.time * 8) * 0.25;
        createTypingParticles(a);
      }
      
      a.head.rotation.y = Math.sin(a.time * 0.4) * 0.15;
    }
    
    a.label.position.set(a.group.position.x, a.group.position.y + 2.3, a.group.position.z);
    a.label.visible = labelsVisible;
  });
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateCamera();
}

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  
  if (autoRotate) targetRotation += 0.001;
  currentRotation += (targetRotation - currentRotation) * 0.04;
  updateCamera();
  
  animateAgents(delta);
  updateBubbles(delta);
  updateParticles(delta);
  
  // Update meeting notification periodically
  if (Date.now() - lastMeetingUpdate > 5000) {
    const meetingCount = AGENTS.filter(a => agentStates[a.id].status === 'meeting').length;
    document.getElementById('meetingSub').textContent = `${Math.max(meetingCount, 1)}/5 attending — Daily standup`;
    updateStatusBar();
    lastMeetingUpdate = Date.now();
  }
  
  // Blink server LEDs
  scene.traverse(child => {
    if (child.userData.blink) {
      child.material.opacity = 0.5 + Math.sin(Date.now() * 0.005 + child.userData.offset) * 0.5;
    }
  });
  
  renderer.render(scene, camera);
}

init();
</script>
